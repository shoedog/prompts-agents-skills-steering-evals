    task_input: "# guard.Guard\n\nA re-entrant guard: nested `enter`/`exit` calls share one mutex.\n\nContract:\n- `enter()` enters a (possibly nested) guarded section, acquiring the mutex\n  on the outermost level.\n- `exit()` leaves one level, releasing the mutex only when the outermost\n  level closes.\n- `force_reset()` aborts all levels and releases the mutex if held.\n- `depth`, `held`, `is_root`, `state`, `reset`, `run`, `locked` are\n  helpers over the same mutex/level.\n\n\n--- a/guard.py\n+++ b/guard.py\n@@ -4,14 +4,17 @@\n class Guard:\n-    \"\"\"Guards a critical section with a single lock.\"\"\"\n+    \"\"\"Re-entrant guard: nested enter/exit share one mutex.\"\"\"\n \n     def __init__(self):\n-        self._lock = threading.Lock()\n+        self._mutex = threading.Lock()\n+        self._depth = 0\n \n     def depth(self):\n-        \"\"\"Nesting depth (0 or 1 in the non-reentrant guard).\"\"\"\n-        return 1 if self._lock.locked() else 0\n+        \"\"\"Current nesting depth.\"\"\"\n+        return self._depth\n \n     def enter(self):\n-        \"\"\"Enter the guarded section.\"\"\"\n-        self._lock.acquire()\n+        \"\"\"Enter a (possibly nested) guarded section.\"\"\"\n+        if self._depth == 0:\n+            self._mutex.acquire()\n+        self._depth += 1\n \n@@ -19,8 +22,10 @@\n         \"\"\"Whether the lock is currently held.\"\"\"\n-        return self._lock.locked()\n+        return self._mutex.locked()\n \n     def exit(self):\n-        \"\"\"Leave the guarded section.\"\"\"\n-        self._lock.release()\n-        return True\n+        \"\"\"Leave one nesting level.\"\"\"\n+        self._depth -= 1\n+        if self._depth == 0:\n+            self._mutex.release()\n+        return self._depth\n \n@@ -34,3 +39,21 @@\n \n+    def is_root(self):\n+        \"\"\"Whether at most one level is open.\"\"\"\n+        return self._depth <= 1\n+\n+    def force_reset(self):\n+        \"\"\"Abort all nesting levels and release the lock if held.\"\"\"\n+        self._depth = 0\n+        if self._mutex.locked():\n+            self._mutex.release()\n+\n+    def state(self):\n+        \"\"\"A (depth, held) snapshot of the guard.\"\"\"\n+        return (self._depth, self._mutex.locked())\n+\n+    def reset(self):\n+        \"\"\"Alias for force_reset().\"\"\"\n+        self.force_reset()\n+\n     def locked(self):\n-        return self._lock.locked()\n+        return self._mutex.locked()\n"
