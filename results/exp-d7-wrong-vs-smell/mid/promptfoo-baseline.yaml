    task_input: "# rate_window.RateWindow\n\nA sliding-window event counter. The internal clock is integer\nmilliseconds; the public API takes timestamps in seconds.\n\nContract:\n- `record(at_seconds)` records an event at `at_seconds`.\n- `count_since(now_seconds)` returns how many recorded events fall within\n  the window ending at `now_seconds`.\n- `prune(now_seconds)` drops events older than the window and returns how\n  many remain.\n- `earliest`, `newest`, `in_window`, `total`, `span_ms`, `window_ms`,\n  `reset`, `is_empty` are read-only/utility helpers over the same events.\n\n\n--- a/rate_window.py\n+++ b/rate_window.py\n@@ -7,7 +7,7 @@\n     \"\"\"Sliding-window event counter. Timestamps are supplied in seconds.\"\"\"\n \n     def __init__(self, window_seconds):\n-        self._window_ms = to_ms(window_seconds)\n+        self._span_ms = to_ms(window_seconds)\n         self._events = []\n \n     def total(self):\n@@ -16,7 +16,7 @@\n \n     def record(self, at_seconds):\n         \"\"\"Record an event at `at_seconds`.\"\"\"\n-        self._events.append(at_seconds)\n+        self._events.append(to_ms(at_seconds))\n \n     def earliest(self):\n         \"\"\"The oldest recorded timestamp (ms), or None.\"\"\"\n@@ -24,8 +24,14 @@\n \n     def count_since(self, now_seconds):\n         \"\"\"Events within the window ending at `now_seconds`.\"\"\"\n-        cutoff = now_seconds - self._window_ms\n+        cutoff = to_ms(now_seconds) - self._span_ms\n         return sum(1 for e in self._events if e >= cutoff)\n+\n+    def prune(self, now_seconds):\n+        \"\"\"Drop events older than the window; return how many remain.\"\"\"\n+        cutoff = to_ms(now_seconds) - self._span_ms\n+        self._events = [e for e in self._events if e >= cutoff]\n+        return len(self._events)\n \n     def newest(self):\n         \"\"\"The most recent recorded timestamp (ms), or None.\"\"\"\n@@ -33,9 +39,25 @@\n \n     def in_window(self, now_seconds):\n         \"\"\"The event ti