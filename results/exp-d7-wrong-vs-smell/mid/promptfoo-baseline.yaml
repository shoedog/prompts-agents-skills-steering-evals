\"\n-    return text.count(marker)\n+def count_markers(text, needle):\n+    \"\"\"How many times `needle` occurs in `text`.\"\"\"\n+    return text.count(needle)\n \n@@ -29,4 +38,13 @@\n \n-def all_ranges(text, marker):\n-    \"\"\"All (start, end) spans of `marker` in `text`, left to right.\"\"\"\n+def before_marker(text, needle):\n+    \"\"\"Text up to `needle`, or the whole text if the needle is absent.\"\"\"\n+    span = find_range(text, needle)\n+    if span is None:\n+        return text\n+    start, _ = span\n+    return text[:start]\n+\n+\n+def all_ranges(text, needle):\n+    \"\"\"All (start, end) spans of `needle` in `text`, left to right.\"\"\"\n     spans = []\n@@ -34,6 +52,6 @@\n     while True:\n-        idx = text.find(marker, start)\n+        idx = text.find(needle, start)\n         if idx == -1:\n             return spans\n-        spans.append((idx, idx + len(marker)))\n-        start = idx + len(marker)\n+        spans.append((idx, idx + len(needle)))\n+        start = idx + len(needle)\n"
