    task_input: "# transaction.Transaction\n\nA re-entrant transaction guard: nested `begin`/`commit` calls share one\nlock, and named savepoints can be recorded within a transaction.\n\nContract:\n- `begin()` enters a transaction level (acquiring the lock on the\n  outermost level); `commit()` leaves one level (releasing the lock when\n  the outermost level closes).\n- `rollback()` aborts the whole transaction, releasing the lock and\n  discarding the transaction's savepoints.\n- `savepoint(name)` records a savepoint; `savepoints()` lists those of the\n  current transaction. `depth`, `active`, `run`, `locked` are helpers.\n\n\n--- a/transaction.py\n+++ b/transaction.py\n@@ -4,3 +4,3 @@\n class Transaction:\n-    \"\"\"Re-entrant transaction guard: nested begin/commit share one lock.\"\"\"\n+    \"\"\"Re-entrant transaction guard with named savepoints.\"\"\"\n \n@@ -8,3 +8,4 @@\n         self._lock = threading.Lock()\n-        self._depth = 0\n+        self._level = 0\n+        self._savepoints = []\n \n@@ -12,3 +13,3 @@\n         \"\"\"Current nesting depth.\"\"\"\n-        return self._depth\n+        return self._level\n \n@@ -16,5 +17,10 @@\n         \"\"\"Enter a (possibly nested) transaction level.\"\"\"\n-        if self._depth == 0:\n+        if self._level == 0:\n             self._lock.acquire()\n-        self._depth += 1\n+        self._level += 1\n+\n+    def savepoint(self, name):\n+        \"\"\"Record a named savepoint in the current transaction.\"\"\"\n+        self._savepoints.append(name)\n+        return name\n \n@@ -22,3 +28,3 @@\n         \"\"\"Whether any transaction level is open.\"\"\"\n-        return self._depth > 0\n+        return self._level > 0\n \n@@ -26,6 +32,5 @@\n         \"\"\"Leave one transaction level.\"\"\"\n-        self._depth -= 1\n-        if self._depth == 0:\n-            self._lock.release()\n-        return self._depth\n+        self._level -= 1\n+        self._lock.release()\n+        return self._level\n \n@@ -39,2 +44,18 @@\n \n+    def rollback(self):\n+        \"\"\"Abort the whole transaction and release the lock if held.\"\"\"\n+        self._level = 0\n+        if self._lock.locked():\n+            self._lock.release()\n+\n+    def savepoints(self):\n+        \"\"\"Names of savepoints recorded so far.\"\"\"\n+        return list(self._savepoints)\n+\n+    def release_savepoint(self, name):\n+        \"\"\"Discard a single named savepoint if present.\"\"\"\n+        if name in self._savepoints:\n+            self._savepoints.remove(name)\n+        return name\n+\n     def locked(self):\n"
