    task_input: "# leaderboard.Leaderboard\n\nKeeps scores in ascending sorted order so rank queries can use binary\nsearch.\n\nContract:\n- `add(value)` inserts one score, keeping `_scores` globally sorted.\n- `add_many(values)` bulk-inserts several scores, keeping `_scores`\n  globally sorted.\n- `rank(value)` returns how many stored scores are strictly less than\n  `value`; `contains(value)` reports membership. Both assume `_scores` is\n  sorted (binary search).\n- `percentile`, `median`, `worst`, `top`, `size` are read-only queries.\n\n\n--- a/leaderboard.py\n+++ b/leaderboard.py\n@@ -1,5 +1,8 @@\n+import bisect\n+\n+\n class Leaderboard:\n-    \"\"\"Keeps scores in ascending sorted order.\"\"\"\n+    \"\"\"Keeps scores in ascending sorted order for O(log n) rank queries.\"\"\"\n \n     def __init__(self):\n         self._scores = []\n@@ -8,20 +11,18 @@\n         \"\"\"The single lowest score, or None.\"\"\"\n         return self._scores[0] if self._scores else None\n \n-    def add(self, score):\n+    def add(self, value):\n         \"\"\"Insert one score, keeping the list sorted.\"\"\"\n-        i = 0\n-        while i < len(self._scores) and self._scores[i] < score:\n-            i += 1\n-        self._scores.insert(i, score)\n+        bisect.insort(self._scores, value)\n \n     def size(self):\n         \"\"\"Number of stored scores.\"\"\"\n         return len(self._scores)\n \n-    def rank(self, score):\n-        \"\"\"Count of stored scores strictly less than `score`.\"\"\"\n-        return sum(1 for s in self._scores if s < score)\n+    def add_many(self, values):\n+        \"\"\"Bulk-insert many scores at once.\"\"\"\n+        self._scores.extend(sorted(values))\n+        return len(self._scores)\n \n     def percentile(self, p):\n         \"\"\"The score at percentile `p` (0..100), or None if empty.\"\"\"\n@@ -30,10 +31,21 @@\n         idx = (len(self._scores) - 1) * p // 100\n         return self._scores[idx]\n \n-    def contains(self, score):\n-        \"\"\"Whether `score` is present.\"\"\"\n-        return score in self._scores\n+    def rank(self, value):\n+        \"\"\"Count of stored scores strictly less than `value`.\"\"\"\n+        return bisect.bisect_left(self._scores, value)\n+\n+    def median(self):\n+        \"\"\"The middle score by position, or None if empty.\"\"\"\n+        if not self._scores:\n+            return None\n+        return self._scores[len(self._scores) // 2]\n \n     def top(self, n):\n         \"\"\"The `n` highest scores, descending.\"\"\"\n         return self._scores[-n:][::-1]\n+\n+    def contains(self, value):\n+        \"\"\"Whether `value` is present (binary search).\"\"\"\n+        i = bisect.bisect_left(self._scores, value)\n+        return i < len(self._scores) and self._scores[i] == value\n"
