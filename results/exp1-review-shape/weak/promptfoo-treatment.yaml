    task_input: "# txn.run_in_transaction\n\n`run_in_transaction(conn, fn)` runs `fn(conn)` inside a transaction.\n\nContract:\n- On success, COMMIT the transaction, then return `fn`'s result.\n- If `fn` raises, roll the transaction back and RE-RAISE the original\n  exception (callers must still see the error).\n- Always close the connection afterwards, on success and failure.\n- `conn.close()` is idempotent.\n\n\n--- a/txn.py\n+++ b/txn.py\n@@ -1,2 +1,24 @@\n+def run_in_transaction(conn, fn):\n+    try:\n+        result = fn(conn)\n+        conn.commit()\n+        return result\n+    except Exception:\n+        conn.rollback()\n+        raise\n+    finally:\n+        conn.close()\n+\n+\n def _dsn(cfg):\n     return cfg[\"dsn\"]\n+\n+\n+def with_connection(conn, fn):\n+    \"\"\"Run `fn` inside a transaction and return its result.\"\"\"\n+    return run_in_transaction(conn, fn)\n+\n+\n+def _pool_size(cfg):\n+    \"\"\"Configured connection-pool size (default 5).\"\"\"\n+    return cfg.get(\"pool_size\", 5)\n"
