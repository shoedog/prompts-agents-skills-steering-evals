    task_input: "# billing_dates.next_billing_date\n\n`next_billing_date(d)` returns the billing date one month after `d`,\npreserving the day-of-month where possible.\n\nContract:\n- Return a `date` in the FOLLOWING month with the same day-of-month as `d`.\n- If the following month has fewer days than `d.day` (e.g. Jan 31 -> Feb),\n  clamp to the LAST valid day of that following month (Jan 31 -> Feb 28).\n- Roll the year over correctly for December.\n- Must never raise for any valid input date.\n\n\n--- a/billing_dates.py\n+++ b/billing_dates.py\n@@ -1,6 +1,28 @@\n import calendar\n from datetime import date\n \n \n+def next_billing_date(d):\n+    month = d.month + 1\n+    year = d.year\n+    if month > 12:\n+        month = 1\n+        year += 1\n+    # Clamp the day to the number of days in the target month.\n+    last_day = calendar.monthrange(year, d.month)[1]\n+    day = min(d.day, last_day)\n+    return date(year, month, day)\n+\n+\n def prev_billing_date(d):\n     ...\n+\n+\n+def is_month_end(d):\n+    \"\"\"True if `d` is the last day of its own month.\"\"\"\n+    return d.day == calendar.monthrange(d.year, d.month)[1]\n+\n+\n+def is_december(d):\n+    \"\"\"True if `d` falls in December.\"\"\"\n+    return d.month == 12\n"
