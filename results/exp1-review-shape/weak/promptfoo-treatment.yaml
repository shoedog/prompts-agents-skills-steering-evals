    task_input: "# list_view.page_bounds\n\n`page_bounds(page, page_size, total)` computes slice indices for a 1-indexed\npage over a 0-indexed list of `total` items.\n\nContract:\n- `page` is 1-indexed (page 1 is first); `page_size >= 1`.\n- Return `(start, end)` such that `items[start:end]` is the page's slice.\n- `end` is exclusive and clamped to `total`, so the final (possibly partial)\n  page is handled and never reads past the end.\n\n\n--- a/list_view.py\n+++ b/list_view.py\n@@ -1,5 +1,26 @@\n from math import ceil\n \n \n+def page_bounds(page, page_size, total):\n+    start = (page - 1) * page_size\n+    end = min(start + page_size, total)\n+    return start, end\n+\n+\n def page_count(total, page_size):\n     return ceil(total / page_size)\n+\n+\n+def has_next_page(page, page_size, total):\n+    \"\"\"True if a page exists after 1-indexed `page`.\"\"\"\n+    return page * page_size < total\n+\n+\n+def is_first_page(page):\n+    \"\"\"True for the first (1-indexed) page.\"\"\"\n+    return page == 1\n+\n+\n+def last_index(total):\n+    \"\"\"Zero-based index of the final item (or -1 when empty).\"\"\"\n+    return total - 1\n"
