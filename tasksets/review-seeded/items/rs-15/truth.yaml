clean_rationale: 'Indices are correct for 1-indexed pages: start = (page-1)*page_size and end clamped
  to total; slicing never over-reads and the last partial page is returned.'
tempting_non_defects:
- '`(page - 1) * page_size` is the correct 1-indexed-to-offset conversion, not an off-by-one.'
