defects:
- id: rs-02-d1
  defect_class: inverted condition (wrong comparison operator)
  location: access.py:23
  hunk_lines: 18-27
  description: the ownership check uses `!=` where it should use `==`, so a non-admin is allowed precisely
    when they are NOT the owner.
  root_cause: '`user.id != resource.owner_id` inverts the ownership predicate (should be `==`).'
  bad_behavior: any non-admin user is granted access to resources they do not own (privilege escalation),
    and a non-admin owner is denied their own resource.
  minimal_trigger: a non-admin user whose id differs from resource.owner_id -> can_access returns True
    (should be False).
  acceptable_match: any finding naming that the ownership comparison uses `!=` instead of `==`, letting
    non-owners access resources / granting access to the wrong users.
  reject_if: a generic 'access control looks risky/insecure' without identifying the `!=` vs `==` inversion
    or that non-owners are wrongly granted access.
