    call's list still contains the first call's messages.
  acceptable_match: any finding naming the mutable default argument `warnings=[]` being shared/accumulating
    across calls.
  reject_if: a generic 'default argument looks unusual' without identifying the shared-mutable-default
    accumulation bug.
