defects:
- id: rs-01-d1
  defect_class: off-by-one / boundary
  location: pagination.py:15
  hunk_lines: 8-30
  description: '`total_items // page_size + 1` is not a correct ceiling; it over-counts by one whenever
    total_items is an exact multiple of page_size, and returns 1 for 0 items.'
  root_cause: floor division plus a constant 1 instead of ceiling division ((total_items + page_size -
    1) // page_size).
  bad_behavior: returns one page too many for exact multiples (e.g. 20 items / 10 per page -> 3) and returns
    1 for 0 items (should be 0), producing a trailing empty page.
  minimal_trigger: total_items an exact multiple of page_size, e.g. total_pages(20, 10) returns 3 instead
    of 2; total_pages(0, 10) returns 1 instead of 0.
  acceptable_match: any finding stating that total_pages over-counts by one for exact multiples (or returns
    1 for 0 items), or that `// + 1` is wrong ceiling division.
  reject_if: a vague 'pagination math looks off' that does not identify the exact-multiple/zero over-count
    or the `// + 1` idiom.
