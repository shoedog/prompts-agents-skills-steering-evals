defects: []
clean_rationale: 'On the success path the code commits before returning (the result is captured in a local,
  then `conn.commit()` runs, then the local is returned), so successful writes are persisted, not discarded;
  if `fn` raises, it rolls back and re-raises the original exception (no swallow); `finally` closes exactly
  once on every path.'
tempting_non_defects:
- '`conn.commit()` IS called on the success path (after `fn` returns, before `return result`), so successful
  writes are committed - they are NOT silently discarded.'
- 'the `except Exception` does NOT swallow the error: it calls `rollback()` and then `raise`, which re-raises
  the original exception.'
- 'the result is stored in a local before commit and returned afterwards; `finally: conn.close()` has no
  return statement, so it does not override the returned value.'
- close() runs once (in finally) and is idempotent per the contract, so there is no double-close problem.
- 'the `except Exception:` runs `conn.rollback()` then a bare `raise`; observing that IF `rollback()`
  itself raised it could mask the original exception is a pedantic point about a standard idiom. The
  contract only requires the ORIGINAL exception be re-raised - which the bare `raise` does - and does not
  require guarding against a failing rollback, so flagging rollback-masking is a non-defect on this clean
  diff.'
