    is 5000.
  acceptable_match: any finding naming that `remaining` reads the Limit header instead of the Remaining
    header (wrong key), reporting total quota instead of remaining.
  reject_if: a generic 'header parsing may be wrong' without naming the Limit-vs-Remaining key mix-up.
