    file descriptor is never closed and leaks until garbage collection.
  minimal_trigger: a file whose first non-empty line is malformed so parse_line raises before f.close()
    is reached.
  acceptable_match: any finding naming that the file handle is not closed / leaks when parse_line raises
    (missing with-statement or try/finally).
  reject_if: a finding that only suggests using a list comprehension or comments on style without identifying
    the unclosed-file-on-exception leak.
