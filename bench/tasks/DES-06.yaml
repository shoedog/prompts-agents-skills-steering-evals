  `StmtKind`). rayon is a dep; C1/C2 (the S1 perf parallel-extractâ†’serial-assemble pattern) is the precedent.

  ## Output (plain text, no fence)
  - **ANALYSIS:** target confirmation + parallel/serial split.
  - **DESIGN:** parallel-collect â†’ serial-create (types, dedup, apply order).
  - **ARCHITECTURE / RISK:** the byte-identical proof â€” node order, location_index, stmt_index, the oracle,
    determinism, Send/Sync, the enumerated failure modes + guards.
  - **VERDICT:** GO/NO-GO + risk-mitigation + what must be proven. Be decisive.

